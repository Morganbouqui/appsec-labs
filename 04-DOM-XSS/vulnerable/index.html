<!DOCTYPE html>
<html>

<head>
    <title>DOM XSS Lab</title>
</head>

<body>

<h2>Welcome</h2>

<div id="welcome"></div>

<script>

const params = new URLSearchParams(window.location.search);

const name = params.get("name") || "Guest";

document.getElementById("welcome").innerHTML =
    "Hello " + name;

</script>

</body>

</html>
